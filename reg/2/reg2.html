<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в TokenTraders</title>
    <link rel="stylesheet" href="reg2.css">
</head>
<body>
    <div class="login-container">
        <h2>Регистрация</h2>
        <form action="/submit-registration" method="post">
            <div class="input-group">
                <input type="text" name="username" id="username" placeholder="Логин" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" id="email" placeholder="E-mail" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Пароль" required>
            </div>
            <div class="input-group">
                <input type="password" name="confirm-password" id="confirm-password" placeholder="Пароль снова" required>
            </div>
            <div class="input-group">
                <button type="submit">Регистрация</button>
            </div>
            <div class="links">
                <a href="javascript:history.back()" >Уже есть аккаунт? Войти</a>
            </div>
        </form>
        <button id='back' type="button" onclick="javascript:history.back()">Назад</button>
    </div>
</body>
</html>
